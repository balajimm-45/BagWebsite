<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1{
            color:#f7941d;
        }
        .container{
            display: flex;
            width: 310px;
            height: 500px;
            border-radius: 15px;
            justify-content: center;
            border: 2px solid #3d251a;
            background-color: #fcb92d;
            box-shadow: 5px 5px rgb(166, 161, 161),inset #f7941d 5px 5px ;
        }
        .calculator{
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            
        }
        .display{
            font-size: 40px;
            width:285px;
            height: 100px;
            color: #3d251a;
            border: 5px solid #3d251a;
            border-radius: 10px;
            background-color: #bef7ff;
            box-shadow: inset 7px 8px #7dd4f5;
            text-align: right;
        }
        .cal{
            display:flex;
            gap: 20px;            
        }
        .box{
            width: 60px;
            height: 50px;
            border: 3px solid #3d251a;
            border-radius: 8px;
            font-size: 30px;
            text-align: center;
            color: #3d251a;
            background-color: #fadda1;
        }
        .last{
            display: flex;
            justify-content: space-evenly;
        }
        .ac{
            width: 120px;
        }
        .dot{
            font-size: 40px;
        }
        .box:hover{
            transform: translateY(-3px) scale(1.05);
            box-shadow: #3d251a 3px 3px , inset 5px 5px #E9E4D9;
            transition: all 0.2s;
        }
    </style>
</head>
<body>
    <h1>CALCULATOR</h1>
    <div class="container">
        <div class="calculator">
            <input type="text" class="display" id="display" readonly>
            <div class="cal">
                <button class="box" onclick="add(7)">7</button>
                <button class="box" onclick="add(8)">8</button>
                <button class="box" onclick="add(9)">9</button>
                <button class="box" onclick="add('/')">/</button>
            </div>
            <div class="cal">
                <button class="box" onclick="add(4)">4</button>
                <button class="box" onclick="add(5)">5</button>
                <button class="box" onclick="add(6)">6</button>
                <button class="box" onclick="add('*')">*</button>
            </div>
            <div class="cal">
                <button class="box" onclick="add(1)">1</button>
                <button class="box" onclick="add(2)">2</button>
                <button class="box" onclick="add(3)">3</button>
                <button class="box" onclick="add('-')">-</button>
            </div>
            <div class="cal">
                <button class="box" onclick="add(0)">0</button>
                <button class="box dot" onclick="add('.')">.</button>
                <button class="box" onclick="total()">=</button>
                <button class="box" onclick="add('+')">+</button>
            </div>
            <div class="cal last">
                <button class="box ac" onclick="ac()">AC</button>
                <button class="box ac" onclick="del()">DEL</button>
            </div>
        </div>
    </div>
    <script>
        let isResult=false;
        function add(num){
           let display = document.getElementById("display")
            if(isResult){
                if(['+','-','*','/',"."].includes(num)){
                    display.value+=num;
                    isResult=false;
                    return;
                }
            }
            display.value+=num;
        }
        function ac(){
            document.getElementById("display").value=" "
        }
        function del(){
            let display = document.getElementById("display");
            display.value=display.value.slice(0,-1);
        }
        function total(){
            let display=document.getElementById("display");
            try{
                display.value=eval(display.value);
                isResult=true;
            }
            catch{
                display.value="Error"
            }
        }
    </script>
</body>
</html>
